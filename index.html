<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeTelegram</title>
<style>
:root {
  --bg-main: #191919;       /* Warm Charcoal */
  --bg-sidebar: #222222;    /* Deep Charcoal */
  --text-primary: #FBFAF7;  /* Off-white / Soft Cream */
  --text-secondary: #B4B4B4;/* Medium Gray */
  --accent: #333333;        /* UI Accents & Active States */
  --accent-hover: #3a3a3a;
  --font-family: 'Inter', 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  --fw-normal: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background-color: var(--bg-main);
  color: var(--text-primary);
  font-family: var(--font-family);
  font-weight: var(--fw-semibold);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  height: 100vh;
  width: 100vw;
  display: flex;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

input, textarea, button {
  font-family: var(--font-family);
  font-weight: var(--fw-semibold);
}

/* ============ AUTH VIEW ============ */
.auth-view {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  background-color: var(--bg-main);
}

.auth-card {
  width: 360px;
  padding: 40px;
  text-align: center;
}

.auth-card h1 {
  font-size: 24px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  margin-bottom: 8px;
}

.auth-card p {
  font-size: 14px;
  font-weight: var(--fw-normal);
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.auth-card input {
  width: 100%;
  background-color: transparent;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.15s ease;
}

.auth-card input:focus { border-color: var(--text-secondary); }
.auth-card input::placeholder { color: var(--text-secondary); }

.auth-card button {
  width: 100%;
  background-color: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-weight: var(--fw-semibold);
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.auth-card button:hover { background-color: var(--accent-hover); }

/* ============ MAIN LAYOUT ============ */
.app-shell { display: flex; width: 100%; height: 100%; }

/* ============ SIDEBAR ============ */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background-color: var(--bg-sidebar);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--accent);
}

.sidebar-header {
  padding: 16px 20px;
  font-size: 16px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-list { display: flex; flex-direction: column; }

.chat-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  gap: 12px;
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.chat-item:hover { background-color: var(--accent); }
.chat-item--active { background-color: var(--accent); }

.chat-item-info { flex: 1; min-width: 0; }

.chat-item-name {
  font-size: 14px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item-preview {
  font-size: 13px;
  font-weight: var(--fw-normal);
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.chat-item-badge {
  background-color: var(--text-secondary);
  color: var(--bg-main);
  font-size: 11px;
  font-weight: var(--fw-semibold);
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background-color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  flex-shrink: 0;
}

/* ============ CHAT WINDOW ============ */
.chat-window {
  flex-grow: 1;
  background-color: var(--bg-main);
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
}

.chat-window-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--accent);
  font-size: 15px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
}

.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-row { display: flex; flex-direction: column; }
.msg-row--out { align-items: flex-end; }
.msg-row--in { align-items: flex-start; }

.message-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  background-color: var(--accent);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: var(--fw-normal);
  line-height: 1.5;
  word-wrap: break-word;
}

.message-bubble--outgoing { background-color: #2a2a2a; }

.message-timestamp {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.message-input {
  padding: 16px 24px;
  border-top: 1px solid var(--accent);
  display: flex;
  align-items: flex-end;
  gap: 12px;
}

.message-input textarea {
  flex: 1;
  background-color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: var(--fw-normal);
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.4;
}

.message-input textarea::placeholder { color: var(--text-secondary); }

.send-button {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s ease;
}

.send-button:hover { color: var(--text-primary); }

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  font-size: 15px;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// ClaudeTelegram - self-contained UI demo (mock data)
// Mirrors the Electron client's auth flow, chat list, and chat
// window. Real Telegram connectivity requires the TDLib-backed
// Electron build; this single file is a previewable UI demo.
// ============================================================

const MOCK_CHATS = [
  { id: 1, title: 'Otabek', preview: 'See you tomorrow!', unread: 2, messages: [
    { text: 'Hey, did you finish the build config?', out: false, time: '09:12' },
    { text: 'Yes, electron-builder is all set up.', out: true, time: '09:14' },
    { text: 'Nice work. See you tomorrow!', out: false, time: '09:15' },
  ]},
  { id: 2, title: 'Design Team', preview: 'Aziza: love the new palette', unread: 5, messages: [
    { text: 'The Claude theme looks incredible', out: false, time: '08:40' },
    { text: 'love the new palette', out: false, time: '08:41' },
  ]},
  { id: 3, title: 'Project Zen', preview: 'You: pushed the changes', unread: 0, messages: [
    { text: 'Anyone reviewing the PR?', out: false, time: 'Mon' },
    { text: 'pushed the changes', out: true, time: 'Mon' },
  ]},
  { id: 4, title: 'Mom', preview: 'Call me when you can', unread: 1, messages: [
    { text: 'Call me when you can', out: false, time: 'Sun' },
  ]},
  { id: 5, title: 'Dev Notes', preview: 'Reminder: ship Phase 1', unread: 0, messages: [
    { text: 'Reminder: ship Phase 1', out: true, time: 'Sat' },
  ]},
];

const app = document.getElementById('app');
let authStage = 'phone';
let activeChatId = null;

// ---------- AUTH ----------
function renderAuth() {
  const stages = {
    phone: { h: 'Claude Telegram', p: 'Enter your phone number to sign in', ph: '+1 234 567 8900', btn: 'Continue', type: 'tel' },
    code:  { h: 'Enter Code', p: 'We sent a verification code to your phone', ph: '12345', btn: 'Verify', type: 'text' },
    password: { h: 'Two-Factor Authentication', p: 'Enter your cloud password', ph: 'Password', btn: 'Sign In', type: 'password' },
  };
  const s = stages[authStage];
  app.innerHTML = `
    <div class="auth-view">
      <div class="auth-card">
        <h1>${s.h}</h1>
        <p>${s.p}</p>
        <input type="${s.type}" id="auth-input" placeholder="${s.ph}" autofocus>
        <button id="auth-submit">${s.btn}</button>
      </div>
    </div>`;

  const input = document.getElementById('auth-input');
  const btn = document.getElementById('auth-submit');
  const submit = () => {
    if (!input.value.trim()) return;
    if (authStage === 'phone') { authStage = 'code'; renderAuth(); }
    else if (authStage === 'code') { authStage = 'password'; renderAuth(); }
    else { renderMain(); }
  };
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

// ---------- MAIN ----------
function renderMain() {
  app.innerHTML = `
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header"><span>Chats</span></div>
        <div class="chat-list" id="chat-list"></div>
      </aside>
      <main class="chat-window" id="chat-window">
        <div class="empty-state">Select a chat to start messaging</div>
      </main>
    </div>`;
  renderChatList();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  MOCK_CHATS.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === activeChatId ? ' chat-item--active' : '');

    const badge = chat.unread > 0
      ? `<div class="chat-item-badge">${chat.unread}</div>` : '';

    item.innerHTML = `
      <div class="avatar">${chat.title.charAt(0).toUpperCase()}</div>
      <div class="chat-item-info">
        <div class="chat-item-name">${chat.title}</div>
        <div class="chat-item-preview">${chat.preview}</div>
      </div>
      ${badge}`;

    item.addEventListener('click', () => { openChat(chat.id); });
    list.appendChild(item);
  });
}

function openChat(chatId) {
  activeChatId = chatId;
  const chat = MOCK_CHATS.find(c => c.id === chatId);
  chat.unread = 0;
  renderChatList();

  const win = document.getElementById('chat-window');
  win.innerHTML = `
    <div class="chat-window-header">${chat.title}</div>
    <div class="messages-container" id="messages"></div>
    <div class="message-input">
      <textarea id="msg-text" placeholder="Type a message..." rows="1"></textarea>
      <button class="send-button" id="send-btn" aria-label="Send">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>`;

  renderMessages(chat);

  const textarea = document.getElementById('msg-text');
  const sendBtn = document.getElementById('send-btn');
  const send = () => {
    const val = textarea.value.trim();
    if (!val) return;
    chat.messages.push({ text: val, out: true, time: nowTime() });
    chat.preview = 'You: ' + val;
    textarea.value = '';
    textarea.style.height = '40px';
    renderMessages(chat);
    renderChatList();
  };
  sendBtn.addEventListener('click', send);
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  textarea.addEventListener('input', () => {
    textarea.style.height = '40px';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });
}

function renderMessages(chat) {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  chat.messages.forEach(m => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (m.out ? 'msg-row--out' : 'msg-row--in');
    row.innerHTML = `
      <div class="message-bubble ${m.out ? 'message-bubble--outgoing' : 'message-bubble--incoming'}">${escapeHtml(m.text)}</div>
      <div class="message-timestamp">${m.time}</div>`;
    box.appendChild(row);
  });
  box.scrollTop = box.scrollHeight;
}

function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// boot
renderAuth();
</script>
</body>
</html>
