<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>ClaudeTelegram</title>
<style>
:root {
  --bg-main: #191919;       /* Warm Charcoal */
  --bg-sidebar: #222222;    /* Deep Charcoal */
  --text-primary: #FBFAF7;  /* Off-white / Soft Cream */
  --text-secondary: #B4B4B4;/* Medium Gray */
  --accent: #333333;        /* UI Accents & Active States */
  --accent-hover: #3a3a3a;
  --font-family: 'Inter', 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  --fw-normal: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background-color: var(--bg-main);
  color: var(--text-primary);
  font-family: var(--font-family);
  font-weight: var(--fw-semibold);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  height: 100vh;
  width: 100vw;
  display: flex;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

input, textarea, button {
  font-family: var(--font-family);
  font-weight: var(--fw-semibold);
}

/* ============ AUTH VIEW ============ */
.auth-view {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  background-color: var(--bg-main);
}

.auth-card {
  width: 360px;
  padding: 40px;
  text-align: center;
}

.auth-card h1 {
  font-size: 24px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  margin-bottom: 8px;
}

.auth-card p {
  font-size: 14px;
  font-weight: var(--fw-normal);
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.auth-card input {
  width: 100%;
  background-color: transparent;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.15s ease;
}

.auth-card input:focus { border-color: var(--text-secondary); }
.auth-card input::placeholder { color: var(--text-secondary); }

.auth-card button {
  width: 100%;
  background-color: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-weight: var(--fw-semibold);
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.auth-card button:hover { background-color: var(--accent-hover); }

/* ============ MAIN LAYOUT ============ */
.app-shell { display: flex; width: 100%; height: 100%; }

/* ============ SIDEBAR ============ */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background-color: var(--bg-sidebar);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--accent);
}

.sidebar-header {
  padding: 16px 20px;
  font-size: 16px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-list { display: flex; flex-direction: column; }

.chat-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  gap: 12px;
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.chat-item:hover { background-color: var(--accent); }
.chat-item--active { background-color: var(--accent); }

.chat-item-info { flex: 1; min-width: 0; }

.chat-item-name {
  font-size: 14px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item-preview {
  font-size: 13px;
  font-weight: var(--fw-normal);
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.chat-item-badge {
  background-color: var(--text-secondary);
  color: var(--bg-main);
  font-size: 11px;
  font-weight: var(--fw-semibold);
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background-color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
  flex-shrink: 0;
}

/* ============ CHAT WINDOW ============ */
.chat-window {
  flex-grow: 1;
  background-color: var(--bg-main);
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
}

.chat-window-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--accent);
  font-size: 15px;
  font-weight: var(--fw-semibold);
  color: var(--text-primary);
}

.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-row { display: flex; flex-direction: column; }
.msg-row--out { align-items: flex-end; }
.msg-row--in { align-items: flex-start; }

.message-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  background-color: var(--accent);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: var(--fw-normal);
  line-height: 1.5;
  word-wrap: break-word;
}

.message-bubble--outgoing { background-color: #2a2a2a; }

.message-timestamp {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.message-input {
  padding: 16px 24px;
  border-top: 1px solid var(--accent);
  display: flex;
  align-items: flex-end;
  gap: 12px;
}

.message-input textarea {
  flex: 1;
  background-color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: var(--fw-normal);
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.4;
}

.message-input textarea::placeholder { color: var(--text-secondary); }

.send-button {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s ease;
}

.send-button:hover { color: var(--text-primary); }

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  font-size: 15px;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script src="./renderer.js"></script>
</body>
</html>
